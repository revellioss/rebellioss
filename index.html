<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
            transition: background 0.3s;
        }
        .game-container {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: #bbada0;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }
        .tile {
            width: 90px;
            height: 90px;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            color: #fff;
            position: absolute;
        }
        .score-board {
            position: absolute;
            top: -50px;
            left: 0;
            right: 0;
            text-align: center;
        }
        .score {
            font-size: 24px;
        }
        .best-score {
            font-size: 18px;
        }
        .button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer"></div>
    <div class="score-board">
        <div class="score">Счет: <span id="currentScore">0</span></div>
        <div class="best-score">Лучший результат: <span id="bestScore">0</span></div>
        <button class="button" id="newGameButton">Новая игра</button>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const currentScoreDisplay = document.getElementById('currentScore');
        const bestScoreDisplay = document.getElementById('bestScore');
        const newGameButton = document.getElementById('newGameButton');

        let board = [];
        let score = 0;

        function init() {
            board = Array.from({ length: 4 }, () => Array(4).fill(0));
            score = 0;
            updateBestScore();
            addTile();
            addTile();
            draw();
        }

        function addTile() {
            let emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }
            if (emptyCells.length) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4; // 90% chance for 2
            }
        }

        function draw() {
            gameContainer.innerHTML = '';
            board.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value > 0) {
                        const tile = document.createElement('div');
                        tile.classList.add('tile');
                        tile.style.backgroundColor = getTileColor(value);
                        tile.style.left = ${c * 100}px;
                        tile.style.top = ${r * 100}px;
                        tile.textContent = value;
                        gameContainer.appendChild(tile);
                    }
                });
            });
