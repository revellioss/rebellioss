<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .info-panel {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            flex: 1;
            min-width: 100px;
        }

        .score-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .score-number {
            font-size: 32px;
            font-weight: bold;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            width: 100%;
            aspect-ratio: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 8px;
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            transition: all 0.15s ease-in-out;
            position: relative;
            min-height: 50px;
        }

        /* Цвета плиток */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 28px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 28px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 28px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; }
        .tile-4096 { background: #eee4da; color: #776e65; font-size: 20px; }

        .tile-move {
            animation: tileMove 0.15s ease-in-out;
        }

        .tile-new {
            animation: tileNew 0.2s ease-in-out;
        }

        @keyframes tileMove {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes tileNew {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            font-weight: bold;
            min-width: 100px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .share-btn {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
        }

        .message {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message.show {
            opacity: 1;
        }

        .arrow-controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
            margin: 20px auto;
            justify-content: center;
        }

        .arrow-controls button {
            width: 60px;
            height: 60px;
            padding: 0;
            font-size: 24px;
        }

        .arrow-up { grid-column: 2; }
        .arrow-down { grid-column: 2; }
        .arrow-left { grid-column: 1; }
        .arrow-right { grid-column: 3; }

        @media (max-width: 600px) {
            .main-container {
                padding: 15px;
            }

            h1 {
                font-size: 36px;
                margin-bottom: 15px;
            }

            .game-board {
                padding: 8px;
                grid-gap: 6px;
            }

            .cell {
                font-size: 24px;
                min-height: 40px;
            }

            button {
                padding: 10px 15px;
                font-size: 12px;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>2048</h1>
        
        <div class="message" id="message"></div>

        <div class="info-panel">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-number" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-number" id="bestScore">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="arrow-controls" id="arrowControls">
            <button class="arrow-up" data-dir="up">▲</button>
            <button class="arrow-left" data-dir="left">◄</button>
            <button class="arrow-down" data-dir="down">▼</button>
            <button class="arrow-right" data-dir="right">►</button>
        </div>

        <div class="controls">
            <button id="newGameBtn">New Game</button>
            <button id="undoBtn" disabled>Undo</button>
            <button class="share-btn" id="shareBtn">Share</button>
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.tiles = [];
                this.score = 0;
                this.bestScore = localStorage.getItem('bestScore2048') || 0;
                this.gameOver = false;
                this.won = false;
                this.history = [];
                
                this.initGame();
                this.setupListeners();
                this.render();
            }

            initGame() {
                this.tiles = Array(this.size * this.size).fill(0);
                this.addNewTile();
                this.addNewTile();
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.history = [];
                document.getElementById('undoBtn').disabled = true;
            }

            addNewTile() {
                const emptyIndices = [];
                this.tiles.forEach((tile, idx) => {
                    if (tile === 0) emptyIndices.push(idx);
                });
                
                if (emptyIndices.length > 0) {
                    const randomIdx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                    this.tiles[randomIdx] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            getRow(r) {
                return this.tiles.slice(r * this.size, (r + 1) * this.size);
            }

            setRow(r, row) {
                for (let c = 0; c < this.size; c++) {
                    this.tiles[r * this.size + c] = row[c];
                }
            }

            getCol(c) {
                const col = [];
                for (let r = 0; r < this.size; r++) {
                    col.push(this.tiles[r * this.size + c]);
                }
                return col;
            }

            setCol(c, col) {
                for (let r = 0; r < this.size; r++) {
                    this.tiles[r * this.size + c] = col[r];
                }
            }

            move(direction) {
                if (this.gameOver || this.won) return;

                const oldTiles = [...this.tiles];
                this.history.push([...oldTiles, this.score]);

                if (direction === 'left') this.moveLeft();
                else if (direction === 'right') this.moveRight();
                else if (direction === 'up') this.moveUp();
                else if (direction === 'down') this.moveDown();

                if (JSON.stringify(oldTiles) !== JSON.stringify(this.tiles)) {
                    this.addNewTile();
                    this.checkGameState();
                    this.render();
                } else {
                    this.history.pop();
                }

                document.getElementById('undoBtn').disabled = this.history.length === 0;
            }

            moveLeft() {
                for (let r = 0; r < this.size; r++) {
                    let row = this.getRow(r);
                    row = this.compress(row);
                    row = this.merge(row);
                    row = this.compress(row);
                    this.setRow(r, row);
                }
            }

            moveRight() {
                for (let r = 0; r < this.size; r++) {
                    let row = this.getRow(r).reverse();
                    row = this.compress(row);
                    row = this.merge(row);
                    row = this.compress(row);
                    this.setRow(r, row.reverse());
                }
            }

            moveUp() {
                for (let c = 0; c < this.size; c++) {
                    let col = this.getCol(c);
                    col = this.compress(col);
                    col = this.merge(col);
                    col = this.compress(col);
                    this.setCol(c, col);
                }
            }

            moveDown() {
                for (let c = 0; c < this.size; c++) {
                    let col = this.getCol(c).reverse();
                    col = this.compress(col);
                    col = this.merge(col);
                    col = this.compress(col);
                    this.setCol(c, col.reverse());
                }
            }

            compress(arr) {
                return arr.filter(val => val !== 0).concat(Array(this.size - arr.filter(val => val !== 0).length).fill(0));
            }

            merge(arr) {
                for (let i = 0; i < arr.length - 1; i++) {
                    if (arr[i] === arr[i + 1] && arr[i] !== 0) {
                        arr[i] *= 2;
                        this.score += arr[i];
                        arr.splice(i + 1, 1);
                        arr.push(0);
                    }
                }
                return arr;
            }

            checkGameState() {
                // Проверка на победу
                if (this.tiles.some(tile => tile === 2048)) {
                    this.won = true;
                    this.showMessage('🎉 You Won!');
                    return;
                }

                // Проверка на поражение
                if (!this.canMove()) {
                    this.gameOver = true;
                    this.showMessage('Game Over!');
                    this.updateBestScore();
                }
            }

            canMove() {
                // Проверка на пустые клетки
                if (this.tiles.some(tile => tile === 0)) return true;

                // Проверка возможности слияния
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const idx = r * this.size + c;
                        const current = this.tiles[idx];
                        if (c < this.size - 1 && current === this.tiles[idx + 1]) return true;
                        if (r < this.size - 1 && current === this.tiles[idx + this.size]) return true;
                    }
                }
                return false;
            }

            updateBestScore() {
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('bestScore2048', this.bestScore);
                }
            }

            undo() {
                if (this.history.length === 0) return;
                const lastState = this.history.pop();
                this.score = lastState[lastState.length - 1];
                this.tiles = lastState.slice(0, lastState.length - 1);
                this.gameOver = false;
                this.won = false;
                document.getElementById('message').classList.remove('show');
                this.render();
                document.getElementById('undoBtn').disabled = this.history.length === 0;
            }

            showMessage(text) {
                const msgEl = document.getElementById('message');
                msgEl.textContent = text;
                msgEl.classList.add('show');
            }

            render() {
                const board = document.getElementById('gameBoard');
                board.innerHTML = '';

                this.tiles.forEach(tile => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (tile !== 0) {
                        cell.classList.add(`tile-${tile}`);
                        cell.textContent = tile;
                    }
                    
                    board.appendChild(cell);
                });

                document.getElementById('score').textContent = this.score;
                document.getElementById('bestScore').textContent = this.bestScore;
            }

            shareScore() {
                const text = `I scored ${this.score} points in 2048!`;
                
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.showAlert(text);
                } else if (navigator.share) {
                    navigator.share({
                        title: '2048',
                        text: text,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(text);
                    alert('Score copied to clipboard!');
                }
            }

            setupListeners() {
                // Keyboard
                document.addEventListener('keydown', (e) => {
                    const dirs = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
                    if (dirs[e.key]) {
                        e.preventDefault();
                        this.move(dirs[e.key]);
                    }
                });

                // Touch/Swipe
                let startX = 0, startY = 0;
                document.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                });
                
                document.addEventListener('touchend', (e) => {
                    const endX = e.changedTouches[0].clientX;
                    const endY = e.changedTouches[0].clientY;
                    const dx = startX - endX;
                    const dy = startY - endY;

                    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                        this.move(dx > 0 ? 'left' : 'right');
                    } else if (Math.abs(dy) > 50) {
                        this.move(dy > 0 ? 'up' : 'down');
                    }
                });

                // Button controls
                document.getElementById('newGameBtn').addEventListener('click', () => {
                    this.initGame();
                    document.getElementById('message').classList.remove('show');
                    this.render();
                });

                document.getElementById('undoBtn').addEventListener('click', () => this.undo());
                document.getElementById('shareBtn').addEventListener('click', () => this.shareScore());

                // Arrow button controls
                document.querySelectorAll('.arrow-controls button').forEach(btn => {
                    btn.addEventListener('click', () => this.move(btn.dataset.dir));
                });

                // Telegram
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                }
            }
        }

        window.addEventListener('load', () => {
            new Game2048();
        });
    </script>
</body>
</html>
