<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Для тебя 💕</title>
<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  overscroll-behavior: none;
}

body {
  min-height: 100vh;
  background: linear-gradient(155deg,#fff0f5 0%,#ffe4ef 45%,#ffd6e7 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  font-family: Georgia, 'Times New Roman', serif;
  /* Respect Telegram safe areas */
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
}

#scene {
  width: 100%;
  max-width: 520px;
  padding: 12px 8px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#bouquet-wrap { width: 100%; max-width: 460px; }
#bouquet-svg  { width: 100%; height: auto; display: block; overflow: visible; }

/* Bloom animation: inner group only scales, outer group holds SVG position */
.bloom-target {
  transform: scale(0);
  transform-box: fill-box;
  transform-origin: center center;
  transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
.bloom-target.open { transform: scale(1); }

@keyframes sw1 { 0%,100%{transform:rotate(-1.6deg)} 50%{transform:rotate(1.6deg)} }
@keyframes sw2 { 0%,100%{transform:rotate(1.2deg)}  50%{transform:rotate(-2deg)  } }
@keyframes sw3 { 0%,100%{transform:rotate(-2deg)  } 50%{transform:rotate(1.2deg) } }
.sw1 { animation:sw1 4s   ease-in-out infinite; transform-box:fill-box; transform-origin:center 80%; }
.sw2 { animation:sw2 4.6s ease-in-out infinite; transform-box:fill-box; transform-origin:center 80%; }
.sw3 { animation:sw3 5.3s ease-in-out infinite; transform-box:fill-box; transform-origin:center 80%; }

#message {
  max-width: 420px;
  width: 90%;
  text-align: center;
  margin: 4px auto 36px;
  opacity: 0;
  transform: translateY(22px);
  transition: opacity 2s ease, transform 2s ease;
  padding: 0 10px;
}
#message.show { opacity:1; transform:translateY(0); }
#message p {
  font-size: clamp(14px, 4.2vw, 20px);
  line-height: 1.82;
  color: #8b2252;
  font-style: italic;
  letter-spacing: 0.03em;
}

.hf {
  position: fixed;
  bottom: -36px;
  pointer-events: none;
  user-select: none;
  animation: fup linear infinite;
  opacity: 0;
}
@keyframes fup {
  0%  { transform:translateY(0) rotate(-8deg); opacity:0 }
  8%  { opacity:.5 }
  92% { opacity:.25 }
  100%{ transform:translateY(-110vh) rotate(8deg); opacity:0 }
}
</style>
</head>
<body>
<div id="scene">
  <div id="bouquet-wrap">
    <svg id="bouquet-svg" viewBox="0 0 460 530" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="message"><p></p></div>
</div>

<script>
// ── EDIT MESSAGE ─────────────────────────────────────────────────────────────
const MESSAGE = "Ты самое лучшее, что случалось в моей жизни. Я очень рад, что мы с тобой вместе. Я очень сильно тебя люблю. Ты самая невообразимая женщина, которую я только встречал в своей жизни.";
// ────────────────────────────────────────────────────────────────────────────

// Init Telegram Web App
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.expand();
  tg.disableVerticalSwipes?.();
  tg.setHeaderColor?.("#ffd6e7");
  tg.setBackgroundColor?.("#fff0f5");
}

const NS  = "http://www.w3.org/2000/svg";
const svg = document.getElementById("bouquet-svg");

const mk = (tag, a, p) => {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(a||{})) e.setAttribute(k,v);
  p && p.appendChild(e);
  return e;
};
const rnd  = (a,b) => a + Math.random()*(b-a);
const rndI = (a,b) => Math.floor(rnd(a, b+1));

// Palettes: [outer, mid, inner, stroke, center]
const PAL = [
  ["#ffd1dc","#f9a8be","#f07898","#c85878","#f5d060"],
  ["#fce4ef","#f9c0d4","#f598b8","#d07898","#f8e060"],
  ["#fff2e0","#ffddb0","#ffbe78","#d09050","#f0d050"],
  ["#fff6ee","#ffecd8","#ffd8b0","#c89870","#f5d058"],
  ["#fde0f0","#f9b8d8","#f090be","#c06890","#f8d858"],
  ["#ffe6e6","#ffc0c8","#f998a8","#d07080","#f4d055"],
  ["#fff0fa","#ffd4ec","#ffb0d8","#d080ac","#f5d860"],
  ["#ffd4c0","#ffb498","#f99070","#c86848","#f0cc50"],
];

function drawRanunculus(parent, r, pal) {
  const [c0,c1,c2,cs,cc] = pal;
  const layers = [
    [5,  0.10, r*.17, r*.25, c2],
    [6,  0.20, r*.18, r*.27, c2],
    [7,  0.32, r*.19, r*.29, c1],
    [8,  0.44, r*.19, r*.30, c1],
    [9,  0.56, r*.19, r*.30, c0],
    [10, 0.67, r*.18, r*.29, c0],
    [11, 0.78, r*.17, r*.28, c0],
    [12, 0.88, r*.16, r*.26, c0],
  ];
  layers.forEach(([n, df, rx, ry, col]) => {
    const dist = r * df;
    for (let i = 0; i < n; i++) {
      const deg = (360/n)*i;
      const rad = deg * Math.PI/180;
      const ex = Math.cos(rad)*dist;
      const ey = Math.sin(rad)*dist;
      mk("ellipse", {
        cx:ex, cy:ey, rx, ry,
        fill:col, stroke:cs, "stroke-width":"0.3", opacity:"0.92",
        transform:`rotate(${deg},${ex},${ey})`
      }, parent);
    }
  });
  mk("circle",{cx:0,cy:0,r:r*.14,fill:cc,stroke:"#c4a028","stroke-width":"0.5"},parent);
  mk("circle",{cx:0,cy:0,r:r*.07,fill:"#ddb020"},parent);
}

// 101 positions — golden-angle spiral
const BX=230, BY=250, MAX_R=136, TOTAL=101;
const PHI = 137.508 * Math.PI/180;

const pos = [];
for (let i=0; i<TOTAL; i++) {
  const t = i/TOTAL;
  const r = Math.sqrt(t)*MAX_R;
  const a = i*PHI;
  pos.push({
    x: BX + r*Math.cos(a),
    y: BY + r*Math.sin(a)*0.80,
    sz: Math.max(11, 27 - t*13),
    pal: PAL[rndI(0, PAL.length-1)],
    rot: rnd(-180,180),
  });
}
pos.sort((a,b) => a.y - b.y);

// ── Wrapping paper ────────────────────────────────────────────────────────
const wG = mk("g",{},svg);
mk("ellipse",{cx:BX,cy:478,rx:112,ry:16,fill:"rgba(0,0,0,0.05)"},wG);
mk("path",{d:`M${BX-108} 360 L${BX-44} 477 L${BX} 487 L${BX} 360 Z`,
  fill:"#fde4f0",stroke:"#efbfd4","stroke-width":"1"},wG);
mk("path",{d:`M${BX+108} 360 L${BX+44} 477 L${BX} 487 L${BX} 360 Z`,
  fill:"#fcd8e8",stroke:"#efbfd4","stroke-width":"1"},wG);
mk("path",{d:`M${BX-90} 372 Q${BX} 394 ${BX+90} 372 L${BX+50} 484 Q${BX} 494 ${BX-50} 484 Z`,
  fill:"#fff0f6",stroke:"#f4bfd4","stroke-width":"1"},wG);
for(let i=0;i<20;i++)
  mk("circle",{cx:rnd(BX-80,BX+80),cy:rnd(382,480),r:rnd(1.8,3.6),fill:"#f4a8c8",opacity:"0.4"},wG);
mk("rect",{x:BX-93,y:354,width:186,height:14,rx:5,fill:"#ee6888"},wG);
mk("ellipse",{cx:BX-24,cy:357,rx:25,ry:14,fill:"#e45070",transform:`rotate(-30,${BX-24},357)`},wG);
mk("ellipse",{cx:BX+24,cy:357,rx:25,ry:14,fill:"#e45070",transform:`rotate(30,${BX+24},357)`},wG);
mk("circle",{cx:BX,cy:361,r:10,fill:"#cc2e56"},wG);
mk("circle",{cx:BX,cy:361,r:5, fill:"#aa1840"},wG);

// ── Stems ─────────────────────────────────────────────────────────────────
const stG = mk("g",{},svg);
pos.forEach(p=>{
  mk("line",{
    x1:p.x, y1:p.y+p.sz*.3,
    x2:BX+(p.x-BX)*.10, y2:357,
    stroke:"#588840",
    "stroke-width":Math.max(0.6,p.sz*.055),
    "stroke-linecap":"round", opacity:"0.58"
  },stG);
});

// ── Leaves ────────────────────────────────────────────────────────────────
const lG = mk("g",{},svg);
[[BX-86,334,-1],[BX+76,328,1],[BX-52,347,-1],[BX+58,344,1],
 [BX-105,322,-1],[BX+93,318,1],[BX-28,355,-1],[BX+34,352,1]]
.forEach(([lx,ly,s])=>{
  mk("path",{
    d:`M${lx} ${ly} Q${lx+s*26} ${ly-23} ${lx+s*14} ${ly-41} Q${lx+s*2} ${ly-20} ${lx} ${ly}`,
    fill:"#66aa50",stroke:"#488838","stroke-width":"0.6",opacity:"0.87"
  },lG);
});

// ── Flowers ───────────────────────────────────────────────────────────────
const bloomTargets = [];
pos.forEach((p, i) => {
  const outer = mk("g",{transform:`translate(${p.x} ${p.y}) rotate(${p.rot})`},svg);
  const inner = mk("g",{},outer);
  inner.classList.add("bloom-target");
  bloomTargets.push({el:inner, outer, sc:["sw1","sw2","sw3"][i%3]});
  drawRanunculus(inner, p.sz, p.pal);
});

// ── Bloom stagger ─────────────────────────────────────────────────────────
bloomTargets.forEach(({el,outer,sc},i)=>{
  setTimeout(()=>{
    el.classList.add("open");
    setTimeout(()=>{
      el.style.transition="none";
      outer.classList.add(sc);
    },700);
  }, 120 + i*28);
});

// ── Show message ──────────────────────────────────────────────────────────
setTimeout(()=>{
  document.querySelector("#message p").textContent = MESSAGE;
  document.getElementById("message").classList.add("show");
}, 120 + TOTAL*28 + 900);

// ── Floating hearts ───────────────────────────────────────────────────────
"♥❤💕🌸✿❀♥❤💕🌸✿❀♥❤💕".split("").forEach((ch)=>{
  const h = document.createElement("span");
  h.className = "hf";
  h.textContent = ch;
  h.style.cssText = `left:${rnd(2,96)}vw;font-size:${rnd(10,18)}px;`
    +`animation-duration:${rnd(7,16)}s;animation-delay:${rnd(0,14)}s;`
    +`color:${["#f47090","#e85070","#ffaac0","#ff80a0","#f090a8"][rndI(0,4)]};`;
  document.body.appendChild(h);
});
</script>
</body>
</html>
