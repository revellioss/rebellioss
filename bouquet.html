<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Для тебя 💕</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background: linear-gradient(155deg,#fff0f5 0%,#ffe4ef 45%,#ffd6e7 100%);
  display:flex; flex-direction:column; align-items:center;
  overflow-x:hidden;
  font-family: Georgia,'Times New Roman',serif;
}
#scene {
  width:100%; max-width:580px;
  padding:16px 8px 0;
  display:flex; flex-direction:column; align-items:center;
}
#bouquet-wrap { width:100%; max-width:500px; }
#bouquet-svg  { width:100%; height:auto; display:block; overflow:visible; }

/* Each flower is positioned by SVG translate; the inner .bloom-target
   handles scale so there's zero CSS/SVG-attribute conflict             */
.bloom-target {
  transform: scale(0);
  transform-box: fill-box;
  transform-origin: center center;
  transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
.bloom-target.open { transform: scale(1); }

/* Sway — applied to the outer <g> that already holds the translate */
@keyframes sw1 { 0%,100%{transform:rotate(-1.6deg)} 50%{transform:rotate(1.6deg)} }
@keyframes sw2 { 0%,100%{transform:rotate(1.2deg)}  50%{transform:rotate(-2deg)  } }
@keyframes sw3 { 0%,100%{transform:rotate(-2deg)  } 50%{transform:rotate(1.2deg) } }
.sw1 { animation:sw1 4s   ease-in-out infinite; transform-box:fill-box; transform-origin:center 80%; }
.sw2 { animation:sw2 4.6s ease-in-out infinite; transform-box:fill-box; transform-origin:center 80%; }
.sw3 { animation:sw3 5.3s ease-in-out infinite; transform-box:fill-box; transform-origin:center 80%; }

#message {
  max-width:450px; width:90%;
  text-align:center;
  margin:6px auto 50px;
  opacity:0; transform:translateY(22px);
  transition: opacity 2s ease, transform 2s ease;
  padding:0 12px;
}
#message.show { opacity:1; transform:translateY(0); }
#message p {
  font-size: clamp(15px,4vw,21px);
  line-height:1.82; color:#8b2252;
  font-style:italic; letter-spacing:0.03em;
}

/* Floating hearts */
.hf {
  position:fixed; bottom:-36px;
  pointer-events:none; user-select:none;
  animation:fup linear infinite; opacity:0;
}
@keyframes fup {
  0%  {transform:translateY(0)   rotate(-8deg); opacity:0}
  8%  {opacity:.55}
  92% {opacity:.28}
  100%{transform:translateY(-108vh) rotate(8deg); opacity:0}
}
</style>
</head>
<body>
<div id="scene">
  <div id="bouquet-wrap">
    <svg id="bouquet-svg" viewBox="0 0 500 560" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="message"><p></p></div>
</div>

<script>
// ── EDIT MESSAGE HERE ────────────────────────────────────────────────────────
const MESSAGE = "Ты самое лучшее, что случалось в моей жизни. Я очень рад, что мы с тобой вместе. Я очень сильно тебя люблю. Ты самая невообразимая женщина, которую я только встречал в своей жизни.";
// ────────────────────────────────────────────────────────────────────────────

const NS  = "http://www.w3.org/2000/svg";
const svg = document.getElementById("bouquet-svg");

const mkEl = (tag, a, p) => {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(a||{})) e.setAttribute(k,v);
  p && p.appendChild(e);
  return e;
};
const rnd  = (a,b) => a + Math.random()*(b-a);
const rndI = (a,b) => Math.floor(rnd(a,b+1));

// Palette: [outer, mid, inner, stroke, center]
const PAL = [
  ["#ffd1dc","#f9a8be","#f07898","#c85878","#f5d060"],
  ["#fce4ef","#f9c0d4","#f598b8","#d07898","#f8e060"],
  ["#fff2e0","#ffddb0","#ffbe78","#d09050","#f0d050"],
  ["#fff6ee","#ffecd8","#ffd8b0","#c89870","#f5d058"],
  ["#fde0f0","#f9b8d8","#f090be","#c06890","#f8d858"],
  ["#ffe6e6","#ffc0c8","#f998a8","#d07080","#f4d055"],
  ["#fff0fa","#ffd4ec","#ffb0d8","#d080ac","#f5d860"],
  ["#ffd4c0","#ffb498","#f99070","#c86848","#f0cc50"],
];

// ── Draw one ranunculus into parent <g> at local (0,0) ─────────────────────
function drawRanunculus(parent, r, pal) {
  const [c0,c1,c2,cs,cc] = pal;

  // 8 layers of petals. Each petal = rotated ellipse around origin.
  // layer: [count, distFrac, rx, ry, color]
  const layers = [
    [5,  0.10, r*.17, r*.25, c2],
    [6,  0.20, r*.18, r*.27, c2],
    [7,  0.32, r*.19, r*.29, c1],
    [8,  0.44, r*.19, r*.30, c1],
    [9,  0.56, r*.19, r*.30, c0],
    [10, 0.67, r*.18, r*.29, c0],
    [11, 0.78, r*.17, r*.28, c0],
    [12, 0.88, r*.16, r*.26, c0],
  ];

  layers.forEach(([n, df, rx, ry, col]) => {
    const dist = r * df;
    for (let i = 0; i < n; i++) {
      const deg = (360/n)*i;
      const rad = deg * Math.PI/180;
      // Center of this ellipse is offset from origin
      const ex = Math.cos(rad) * dist;
      const ey = Math.sin(rad) * dist;
      mkEl("ellipse", {
        cx: ex, cy: ey,
        rx, ry,
        fill: col,
        stroke: cs,
        "stroke-width": "0.3",
        opacity: "0.92",
        transform: `rotate(${deg}, ${ex}, ${ey})`
      }, parent);
    }
  });

  // Center
  mkEl("circle", {cx:0,cy:0, r:r*.14, fill:cc, stroke:"#c4a028","stroke-width":"0.5"}, parent);
  mkEl("circle", {cx:0,cy:0, r:r*.07, fill:"#ddb020"}, parent);
}

// ── 101 positions via golden-angle spiral ──────────────────────────────────
const BX = 250, BY = 268, MAX_R = 148, TOTAL = 101;
const PHI = 137.508 * Math.PI / 180;

const pos = [];
for (let i = 0; i < TOTAL; i++) {
  const t = i / TOTAL;
  const r = Math.sqrt(t) * MAX_R;
  const a = i * PHI;
  pos.push({
    x: BX + r*Math.cos(a),
    y: BY + r*Math.sin(a)*0.80,   // slight vertical squash for natural look
    sz: Math.max(13, 30 - t*14),  // center flowers bigger
    pal: PAL[rndI(0, PAL.length-1)],
    rot: rnd(-180, 180),
  });
}
pos.sort((a,b) => a.y - b.y); // back-to-front

// ── Wrapping paper layer ───────────────────────────────────────────────────
const wG = mkEl("g",{},svg);

mkEl("ellipse",{cx:BX,cy:506,rx:118,ry:17,fill:"rgba(0,0,0,0.055)"},wG);

// Left & right panels
mkEl("path",{d:`M${BX-112} 382 L${BX-46} 506 L${BX} 516 L${BX} 382 Z`,
  fill:"#fde4f0",stroke:"#efc0d4","stroke-width":"1"},wG);
mkEl("path",{d:`M${BX+112} 382 L${BX+46} 506 L${BX} 516 L${BX} 382 Z`,
  fill:"#fcd8e8",stroke:"#efc0d4","stroke-width":"1"},wG);
// Front panel
mkEl("path",{d:`M${BX-93} 396 Q${BX} 420 ${BX+93} 396 L${BX+53} 513 Q${BX} 523 ${BX-53} 513 Z`,
  fill:"#fff0f6",stroke:"#f4c0d4","stroke-width":"1"},wG);
// Dots on wrap
for(let i=0;i<22;i++)
  mkEl("circle",{cx:rnd(BX-82,BX+82),cy:rnd(406,510),r:rnd(1.8,3.8),fill:"#f4a8c8",opacity:"0.4"},wG);

// Ribbon bar
mkEl("rect",{x:BX-96,y:376,width:192,height:14,rx:5,fill:"#ee6888"},wG);
// Bow left
mkEl("ellipse",{cx:BX-25,cy:379,rx:26,ry:15,fill:"#e45070",
  transform:`rotate(-30,${BX-25},379)`},wG);
// Bow right
mkEl("ellipse",{cx:BX+25,cy:379,rx:26,ry:15,fill:"#e45070",
  transform:`rotate(30,${BX+25},379)`},wG);
// Knot
mkEl("circle",{cx:BX,cy:383,r:11,fill:"#cc2e56"},wG);
mkEl("circle",{cx:BX,cy:383,r:5,fill:"#aa1840"},wG);

// ── Stems layer ────────────────────────────────────────────────────────────
const stG = mkEl("g",{},svg);
pos.forEach(p=>{
  mkEl("line",{
    x1:p.x, y1:p.y + p.sz*.3,
    x2:BX+(p.x-BX)*.10, y2:383,
    stroke:"#588840",
    "stroke-width":Math.max(0.7, p.sz*.06),
    "stroke-linecap":"round", opacity:"0.6"
  },stG);
});

// ── Leaves ────────────────────────────────────────────────────────────────
const lG = mkEl("g",{},svg);
[[BX-90,356,-1],[BX+80,350,1],[BX-56,370,-1],[BX+62,366,1],
 [BX-110,344,-1],[BX+98,340,1],[BX-30,378,-1],[BX+36,374,1]]
.forEach(([lx,ly,s])=>{
  mkEl("path",{
    d:`M${lx} ${ly} Q${lx+s*28} ${ly-25} ${lx+s*15} ${ly-44} Q${lx+s*2} ${ly-22} ${lx} ${ly}`,
    fill:"#66aa50",stroke:"#488838","stroke-width":"0.6",opacity:"0.87"
  },lG);
});

// ── Flowers ────────────────────────────────────────────────────────────────
// Architecture: outer <g translate> holds position (SVG attr, never touched by JS).
//               inner <g.bloom-target> is what we scale via CSS class toggle.
// This avoids any CSS↔SVG-attribute transform conflict.
const swayClasses = ["sw1","sw2","sw3"];
const bloomTargets = [];

pos.forEach((p, i) => {
  // Outer group: just position + rotation (SVG attribute — never modified by JS)
  const outer = mkEl("g",{transform:`translate(${p.x} ${p.y}) rotate(${p.rot})`},svg);

  // Inner group: bloom scale target
  const inner = mkEl("g",{},outer);
  inner.classList.add("bloom-target");
  bloomTargets.push({ el:inner, outer, swayClass: swayClasses[i%3] });

  drawRanunculus(inner, p.sz, p.pal);
});

// ── Trigger bloom one by one ───────────────────────────────────────────────
bloomTargets.forEach(({el, outer, swayClass}, i) => {
  setTimeout(()=>{
    el.classList.add("open");
    // After open transition, switch to sway on the outer group
    setTimeout(()=>{
      el.style.transition = "none"; // stop transition interference
      outer.classList.add(swayClass);
    }, 700);
  }, 150 + i*32);
});

// ── Show text ──────────────────────────────────────────────────────────────
setTimeout(()=>{
  document.querySelector("#message p").textContent = MESSAGE;
  document.getElementById("message").classList.add("show");
}, 150 + TOTAL*32 + 1000);

// ── Floating hearts ────────────────────────────────────────────────────────
"♥❤💕🌸✿❀".split("").concat(["♥","❤","💕"]).forEach((ch,i)=>{
  const h = document.createElement("span");
  h.className = "hf";
  h.textContent = ch;
  h.style.cssText = `left:${rnd(2,96)}vw;font-size:${rnd(10,19)}px;`
    +`animation-duration:${rnd(7,15)}s;animation-delay:${rnd(0,13)}s;`
    +`color:${["#f47090","#e85070","#ffaac0","#ff80a0","#f090a8"][rndI(0,4)]};`;
  document.body.appendChild(h);
});
</script>
</body>
</html>
