<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Для тебя 💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #fff0f5 0%, #ffe4ef 40%, #ffd6e7 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    font-family: Georgia, 'Times New Roman', serif;
  }

  #scene {
    width: 100%;
    max-width: 600px;
    padding: 20px 10px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #bouquet-wrap {
    width: 100%;
    max-width: 520px;
  }

  #bouquet-svg {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  #message {
    max-width: 460px;
    width: 90%;
    text-align: center;
    margin: 8px auto 50px;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 2s ease, transform 2s ease;
    padding: 0 12px;
  }
  #message.visible { opacity: 1; transform: translateY(0); }

  #message p {
    font-size: clamp(15px, 4.2vw, 21px);
    line-height: 1.8;
    color: #8b2252;
    font-style: italic;
    letter-spacing: 0.03em;
  }

  .heart-float {
    position: fixed;
    bottom: -40px;
    pointer-events: none;
    user-select: none;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0)   rotate(-8deg)  scale(0.9); opacity: 0; }
    8%   { opacity: 0.55; }
    92%  { opacity: 0.3; }
    100% { transform: translateY(-105vh) rotate(8deg) scale(1.1); opacity: 0; }
  }

  @keyframes sway1 { 0%,100%{transform:rotate(-1.8deg)} 50%{transform:rotate(1.8deg)} }
  @keyframes sway2 { 0%,100%{transform:rotate(1.2deg)}  50%{transform:rotate(-2.2deg)} }
  @keyframes sway3 { 0%,100%{transform:rotate(-2.1deg)} 50%{transform:rotate(1.4deg)} }
</style>
</head>
<body>
<div id="scene">
  <div id="bouquet-wrap">
    <svg id="bouquet-svg" viewBox="0 0 520 570" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="message"><p></p></div>
</div>

<script>
// ── CHANGE THIS TEXT ─────────────────────────────────────────────────────────
const MESSAGE = "Ты самое лучшее, что случалось в моей жизни. Я очень рад, что мы с тобой вместе. Я очень сильно тебя люблю. Ты самая невообразимая женщина, которую я только встречал в своей жизни.";
// ────────────────────────────────────────────────────────────────────────────

const NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("bouquet-svg");

function svgEl(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
const rand  = (a, b) => a + Math.random() * (b - a);
const randI = (a, b) => Math.floor(rand(a, b + 1));

// Color sets: [outer petal, mid petal, inner petal, petal stroke, center]
const COLORS = [
  ["#ffd1dc","#f9a8be","#f2789f","#d45a82","#f5d060"],  // pink
  ["#fce8ef","#f9c8d8","#f5a8bc","#d88aa8","#f8e060"],  // blush
  ["#fff3e0","#ffddb0","#ffc07a","#d4905a","#f0d050"],  // peach
  ["#fff8f0","#ffecd8","#ffd8b0","#c89a78","#f5d058"],  // cream
  ["#fde0f0","#f9c0dc","#f09ac4","#c07098","#f8d858"],  // mauve
  ["#ffe8e8","#ffc8cc","#f9a0a8","#d47880","#f4d055"],  // coral-pink
  ["#fff0f8","#ffd8ec","#ffb8da","#d888b0","#f5d860"],  // light pink
  ["#ffd8c8","#ffb898","#f99070","#c86848","#f0cc50"],  // peach-deep
];

// Draw one ranunculus flower; returns the <g> element
function drawFlower(cx, cy, radius, colorSet, rotDeg) {
  const [c0, c1, c2, stroke, centerCol] = colorSet;

  const g = svgEl("g", {
    transform: `translate(${cx} ${cy}) rotate(${rotDeg})`
  }, svg);

  // Layer definitions: [petalCount, distanceFrac, petalW, petalH, colorIndex, angleOffset]
  const layers = [
    { n:5,  df:0.08, pw:0.30, ph:0.30, c:c2, ao:0   },
    { n:6,  df:0.18, pw:0.32, ph:0.36, c:c2, ao:15  },
    { n:7,  df:0.30, pw:0.34, ph:0.40, c:c1, ao:4   },
    { n:8,  df:0.43, pw:0.34, ph:0.42, c:c1, ao:20  },
    { n:9,  df:0.56, pw:0.33, ph:0.43, c:c0, ao:10  },
    { n:10, df:0.68, pw:0.32, ph:0.43, c:c0, ao:0   },
    { n:11, df:0.80, pw:0.30, ph:0.42, c:c0, ao:14  },
    { n:12, df:0.91, pw:0.28, ph:0.40, c:c0, ao:7   },
  ];

  layers.forEach(({ n, df, pw, ph, c, ao }) => {
    const dist = radius * df;
    const petalW = radius * pw;
    const petalH = radius * ph;
    for (let i = 0; i < n; i++) {
      const angleDeg = (360 / n) * i + ao;
      const a = angleDeg * Math.PI / 180;
      // Each petal is an ellipse rotated to point outward
      const px = Math.cos(a) * dist;
      const py = Math.sin(a) * dist;
      svgEl("ellipse", {
        cx: px, cy: py,
        rx: petalW * 0.5,
        ry: petalH * 0.5,
        fill: c,
        stroke: stroke,
        "stroke-width": "0.25",
        opacity: "0.94",
        transform: `rotate(${angleDeg}, ${px}, ${py})`
      }, g);
    }
  });

  // Center
  svgEl("circle", { cx:0, cy:0, r: radius*0.13, fill: centerCol, stroke:"#c8a030", "stroke-width":"0.4" }, g);
  svgEl("circle", { cx:0, cy:0, r: radius*0.06, fill:"#e0b820" }, g);

  return g;
}

// ── Layout: 101 flowers in a phyllotaxis spiral ─────────────────────────────
const BX = 260, BY = 270;  // bouquet center
const TOTAL = 101;
const GOLDEN = 137.508 * Math.PI / 180;
const MAX_RADIUS = 150;

const positions = [];
for (let i = 0; i < TOTAL; i++) {
  const t = i / TOTAL;
  const r = Math.sqrt(t) * MAX_RADIUS;
  const theta = i * GOLDEN;
  positions.push({
    x: BX + r * Math.cos(theta),
    y: BY + r * Math.sin(theta) * 0.82,
    size: Math.max(12, 28 - t * 12),
    colors: COLORS[randI(0, COLORS.length - 1)],
    rot: rand(-180, 180),
  });
}
// Sort by y → front flowers render last (on top)
positions.sort((a, b) => a.y - b.y);

// ── Wrapping paper (below flowers in draw order) ─────────────────────────────
const wrapLayer = svgEl("g", {}, svg);

// Drop shadow
svgEl("ellipse", { cx: BX, cy: 510, rx:115, ry:16, fill:"rgba(0,0,0,0.06)" }, wrapLayer);

// Paper panels
svgEl("path", {
  d: `M ${BX-110} 385 L ${BX-46} 508 L ${BX} 518 L ${BX} 385 Z`,
  fill:"#fde4ef", stroke:"#f0c0d8", "stroke-width":"1"
}, wrapLayer);
svgEl("path", {
  d: `M ${BX+110} 385 L ${BX+46} 508 L ${BX} 518 L ${BX} 385 Z`,
  fill:"#fcd8e8", stroke:"#f0c0d8", "stroke-width":"1"
}, wrapLayer);
svgEl("path", {
  d: `M ${BX-90} 398 Q ${BX} 422 ${BX+90} 398 L ${BX+52} 512 Q ${BX} 522 ${BX-52} 512 Z`,
  fill:"#fff0f6", stroke:"#f4c0d4", "stroke-width":"1"
}, wrapLayer);

// Polka dots
for (let i = 0; i < 20; i++) {
  svgEl("circle", {
    cx: rand(BX-80, BX+80), cy: rand(408, 510),
    r: rand(2, 4), fill:"#f4b0c8", opacity:"0.45"
  }, wrapLayer);
}

// Ribbon
svgEl("rect", { x:BX-95, y:378, width:190, height:15, rx:5, fill:"#ef7090" }, wrapLayer);
// Bow loops
svgEl("ellipse", { cx:BX-24, cy:381, rx:24, ry:14, fill:"#e85078",
  transform:`rotate(-28,${BX-24},381)` }, wrapLayer);
svgEl("ellipse", { cx:BX+24, cy:381, rx:24, ry:14, fill:"#e85078",
  transform:`rotate(28,${BX+24},381)` }, wrapLayer);
// Knot
svgEl("circle", { cx:BX, cy:385, r:10, fill:"#d03060" }, wrapLayer);
svgEl("circle", { cx:BX, cy:385, r:5,  fill:"#b82050" }, wrapLayer);

// ── Stems ─────────────────────────────────────────────────────────────────
const stemsLayer = svgEl("g", { opacity:"0.85" }, svg);
positions.forEach(p => {
  svgEl("line", {
    x1: p.x, y1: p.y + p.size * 0.35,
    x2: BX + (p.x - BX) * 0.12, y2: 385,
    stroke:"#5a8a45",
    "stroke-width": Math.max(0.6, p.size * 0.055),
    "stroke-linecap":"round",
    opacity:"0.65"
  }, stemsLayer);
});

// ── Leaves ────────────────────────────────────────────────────────────────
const leavesLayer = svgEl("g", {}, svg);
const leafData = [
  [BX-88, 358, -1], [BX+78, 352, 1], [BX-55, 372, -1],
  [BX+60, 368, 1],  [BX-108, 345, -1],[BX+95, 342, 1],
  [BX-30, 380, -1], [BX+38, 376, 1],
];
leafData.forEach(([lx, ly, side]) => {
  svgEl("path", {
    d: `M ${lx} ${ly} Q ${lx+side*26} ${ly-24} ${lx+side*14} ${ly-42} Q ${lx+side*2} ${ly-22} ${lx} ${ly}`,
    fill:"#68aa52", stroke:"#4a8a38", "stroke-width":"0.6", opacity:"0.88"
  }, leavesLayer);
});

// ── Draw all flowers ───────────────────────────────────────────────────────
const flowerData = positions.map((p, i) => {
  const fe = drawFlower(p.x, p.y, p.size, p.colors, p.rot);
  fe.style.opacity = "0";
  fe.style.transformOrigin = `${p.x}px ${p.y}px`;
  fe.style.transform = `translate(${p.x}px,${p.y}px) scale(0) translate(${-p.x}px,${-p.y}px)`;
  return { el: fe, x: p.x, y: p.y, swayClass: ["sway1","sway2","sway3"][i % 3] };
});

// ── Bloom animation ────────────────────────────────────────────────────────
flowerData.forEach(({ el: fe, swayClass }, i) => {
  setTimeout(() => {
    fe.style.transition = "opacity 0.35s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1)";
    fe.style.opacity = "1";
    fe.style.transform = "none";
    setTimeout(() => {
      fe.style.transition = "";
      fe.style.transform = "";
      fe.style.animation = `${swayClass} ${3.5 + (i % 7) * 0.3}s ease-in-out infinite`;
      fe.style.transformBox = "fill-box";
      fe.style.transformOrigin = "center bottom";
    }, 650);
  }, 200 + i * 35);
});

// Show message
setTimeout(() => {
  document.querySelector("#message p").textContent = MESSAGE;
  document.getElementById("message").classList.add("visible");
}, 200 + TOTAL * 35 + 900);

// ── Floating hearts ────────────────────────────────────────────────────────
const HEARTS = ["♥","❤","💕","🌸","✿","❀"];
const heartColors = ["#f47090","#e85070","#ffa0b8","#ff80a0","#f090a8"];
for (let i = 0; i < 20; i++) {
  const h = document.createElement("span");
  h.className = "heart-float";
  h.textContent = HEARTS[randI(0, HEARTS.length-1)];
  h.style.left = rand(1, 97) + "vw";
  h.style.fontSize = rand(10, 20) + "px";
  h.style.animationDuration = rand(7, 16) + "s";
  h.style.animationDelay = rand(0, 12) + "s";
  h.style.color = heartColors[randI(0, heartColors.length-1)];
  document.body.appendChild(h);
}
</script>
</body>
</html>
