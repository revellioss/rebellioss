<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #FFF0F5 0%, #FFE4E9 50%, #FFF0F5 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 60px;
    font-family: Georgia, 'Times New Roman', serif;
    overflow-x: hidden;
  }

  /* Floating hearts */
  .hearts-container {
    position: fixed;
    bottom: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .heart {
    position: absolute;
    bottom: -40px;
    animation: floatUp linear infinite;
    opacity: 0;
    font-size: 18px;
    color: #FFB7C5;
    user-select: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-110vh) rotate(25deg) scale(1.1); opacity: 0; }
  }

  /* Bouquet wrapper */
  #bouquet-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    display: flex;
    justify-content: center;
    margin-top: 10px;
  }
  #bouquet-svg {
    width: 100%;
    height: auto;
    max-width: 520px;
    filter: drop-shadow(0 18px 40px rgba(255,140,160,0.28));
  }

  /* Text */
  #message {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin-top: 32px;
    text-align: center;
    opacity: 0;
    animation: fadeInText 2s ease forwards;
    animation-delay: 4s;
  }
  @keyframes fadeInText {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #message p {
    font-size: clamp(16px, 4.5vw, 22px);
    line-height: 1.8;
    color: #8B4865;
    letter-spacing: 0.02em;
    font-style: italic;
    text-shadow: 0 1px 3px rgba(255,200,215,0.5);
  }
  #message .quote-mark {
    font-size: clamp(36px, 9vw, 56px);
    color: #FFB7C5;
    line-height: 0.5;
    display: block;
    font-style: normal;
    margin-bottom: 8px;
  }
  #message .quote-mark.close {
    margin-top: 8px;
    margin-bottom: 0;
  }
</style>
</head>
<body>

<div class="hearts-container" id="hearts"></div>

<div id="bouquet-wrap">
  <svg id="bouquet-svg" viewBox="0 0 540 620" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bgCircle" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#FFF5F8" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#FFD6E0" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <!-- Background soft glow -->
    <ellipse cx="270" cy="250" rx="230" ry="210" fill="url(#bgCircle)"/>

    <!-- STEMS group -->
    <g id="stems"></g>

    <!-- WRAPPING PAPER -->
    <g id="wrap-paper"></g>

    <!-- FLOWERS group -->
    <g id="flowers"></g>
  </svg>
</div>

<div id="message">
  <span class="quote-mark">&#8220;</span>
  <p id="msg-text"></p>
  <span class="quote-mark close">&#8221;</span>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────
const MESSAGE = "Ты самое лучшее, что случалось в моей жизни. Я очень рад, что мы с тобой вместе. Я очень сильно тебя люблю. Ты самая невообразимая женщина, которую я только встречал в своей жизни.";

document.getElementById('msg-text').textContent = MESSAGE;

const FLOWER_COUNT = 101;
const SVG_NS = "http://www.w3.org/2000/svg";

// Pastel color palette
const PALETTES = [
  { base: '#FFB7C5', dark: '#F0809A', center: '#FADADD' },
  { base: '#FFC0CB', dark: '#F090A8', center: '#FFD1DC' },
  { base: '#FFD1DC', dark: '#FFA0BC', center: '#FFF0F3' },
  { base: '#FADADD', dark: '#F0A8B8', center: '#FFF5F6' },
  { base: '#FFF8E7', dark: '#F5D89A', center: '#FFFFFF' },
  { base: '#FFFDD0', dark: '#F0E085', center: '#FFFFFF' },
  { base: '#FFDAB9', dark: '#F0A878', center: '#FFF3E8' },
  { base: '#FFFFFF', dark: '#F5C8D8', center: '#FFF5F5' },
  { base: '#FFF5F5', dark: '#F5B8C8', center: '#FFFFFF' },
  { base: '#FFE4E9', dark: '#F09AB0', center: '#FFF8FA' },
];

// ── MATH HELPERS ────────────────────────────────────────────────────────
function rnd(min, max) { return min + Math.random() * (max - min); }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ── PETAL PATH ──────────────────────────────────────────────────────────
// Creates an elliptical petal pointing upward, centered at origin
function petalPath(rx, ry) {
  // A petal: narrow at base, wide in middle, pointed at tip
  const w = rx;
  const h = ry;
  return `M 0 0
    C ${w*0.6} ${-h*0.1}, ${w*0.9} ${-h*0.55}, 0 ${-h}
    C ${-w*0.9} ${-h*0.55}, ${-w*0.6} ${-h*0.1}, 0 0 Z`;
}

// ── DRAW ONE RANUNCULUS ─────────────────────────────────────────────────
function createFlower(cx, cy, size, palette, flowerIndex) {
  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('transform', `translate(${cx},${cy})`);
  g.style.transformOrigin = `${cx}px ${cy}px`;

  const layers = 10; // 10 layers of petals
  const baseRx = size * 0.18;
  const baseRy = size * 0.30;

  for (let layer = 0; layer < layers; layer++) {
    const t = layer / (layers - 1); // 0=innermost, 1=outermost
    const petals = 5 + (layer % 3 === 0 ? 1 : 0); // 5 or 6 petals per ring
    const layerRadius = size * (0.06 + t * 0.44); // how far petals extend from center
    const rx = baseRx * (0.4 + t * 0.9);
    const ry = baseRy * (0.4 + t * 1.0);
    const baseAngleOffset = (layer * 17.3) * Math.PI / 180; // rotate each layer slightly

    // Determine petal color — inner petals lighter, outer slightly darker
    let petalColor, shadowColor;
    if (t < 0.25) {
      petalColor = palette.center;
      shadowColor = palette.base;
    } else if (t < 0.65) {
      petalColor = palette.base;
      shadowColor = palette.dark;
    } else {
      petalColor = lerpColor(palette.base, palette.dark, (t - 0.65) / 0.35 * 0.5);
      shadowColor = palette.dark;
    }

    // Draw each petal in this layer
    for (let p = 0; p < petals; p++) {
      const angle = baseAngleOffset + (p / petals) * Math.PI * 2;
      const offsetX = Math.sin(angle) * layerRadius * 0.35;
      const offsetY = -Math.cos(angle) * layerRadius * 0.35;
      const rotDeg = (angle * 180 / Math.PI);

      // Shadow petal (slightly offset for depth)
      const shadowPetal = document.createElementNS(SVG_NS, 'path');
      shadowPetal.setAttribute('d', petalPath(rx * 0.95, ry * 0.95));
      shadowPetal.setAttribute('transform',
        `translate(${offsetX + rx*0.05}, ${offsetY + ry*0.05}) rotate(${rotDeg})`);
      shadowPetal.setAttribute('fill', shadowColor);
      shadowPetal.setAttribute('opacity', '0.45');
      g.appendChild(shadowPetal);

      // Main petal
      const petalEl = document.createElementNS(SVG_NS, 'path');
      petalEl.setAttribute('d', petalPath(rx, ry));
      petalEl.setAttribute('transform',
        `translate(${offsetX}, ${offsetY}) rotate(${rotDeg})`);
      petalEl.setAttribute('fill', petalColor);
      petalEl.setAttribute('opacity', '0.92');
      g.appendChild(petalEl);
    }
  }

  // Center circle (pistil)
  const centerSize = size * 0.07;
  const centerGrad = document.createElementNS(SVG_NS, 'radialGradient');
  centerGrad.setAttribute('id', `cg${flowerIndex}`);
  centerGrad.setAttribute('cx', '40%'); centerGrad.setAttribute('cy', '40%');
  const stops = [
    ['0%', '#FFF9C4', '1'],
    ['50%', '#FFE082', '1'],
    ['100%', '#F9A825', '0.8'],
  ];
  stops.forEach(([offset, color, opacity]) => {
    const s = document.createElementNS(SVG_NS, 'stop');
    s.setAttribute('offset', offset);
    s.setAttribute('stop-color', color);
    s.setAttribute('stop-opacity', opacity);
    centerGrad.appendChild(s);
  });
  // Append gradient to svg defs
  document.querySelector('#bouquet-svg defs').appendChild(centerGrad);

  const center = document.createElementNS(SVG_NS, 'circle');
  center.setAttribute('r', String(centerSize));
  center.setAttribute('fill', `url(#cg${flowerIndex})`);
  g.appendChild(center);

  // Tiny dots on center
  for (let d = 0; d < 5; d++) {
    const dot = document.createElementNS(SVG_NS, 'circle');
    const da = (d / 5) * Math.PI * 2;
    dot.setAttribute('cx', String(Math.sin(da) * centerSize * 0.5));
    dot.setAttribute('cy', String(-Math.cos(da) * centerSize * 0.5));
    dot.setAttribute('r', String(centerSize * 0.15));
    dot.setAttribute('fill', '#E65100');
    dot.setAttribute('opacity', '0.6');
    g.appendChild(dot);
  }

  return g;
}

// ── COLOR LERP ──────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join('');
}
function lerpColor(c1, c2, t) {
  const [r1,g1,b1] = hexToRgb(c1);
  const [r2,g2,b2] = hexToRgb(c2);
  return rgbToHex(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t);
}

// ── BOUQUET LAYOUT ──────────────────────────────────────────────────────
// Generate 101 positions arranged in concentric rings + spiral
// Center of bouquet in SVG coords
const CX = 270, CY = 245;

function generatePositions(count) {
  const positions = [];
  // Use sunflower/phyllotaxis spiral for even distribution
  const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // ~137.5°
  const maxR = 185; // max radius of flower cluster

  // First position: center
  positions.push({ x: CX, y: CY, r: 0, t: 0 });

  for (let i = 1; i < count; i++) {
    const t = i / (count - 1); // 0..1
    const angle = i * goldenAngle;
    // Use sqrt for more even area distribution
    const radius = maxR * Math.sqrt(i / (count - 1));
    positions.push({
      x: CX + Math.cos(angle) * radius,
      y: CY + Math.sin(angle) * radius * 0.88, // slightly oval
      r: radius,
      t: t,
    });
  }
  return positions;
}

// ── DRAW STEMS ──────────────────────────────────────────────────────────
function drawStems(positions) {
  const stemsG = document.getElementById('stems');
  // Only draw stems for flowers that are in the lower half or visible
  // Stems converge to a bundle point at the wrap
  const bundleX = CX, bundleY = 460;

  positions.forEach((pos, i) => {
    // Draw stem from flower center down to bundle
    if (pos.r > 60 || pos.y > CY) {
      const stemX1 = pos.x + rnd(-3, 3);
      const stemY1 = pos.y + rnd(10, 20);
      const stemX2 = bundleX + rnd(-25, 25);
      const stemY2 = bundleY - 10;
      const ctrlX = (stemX1 + stemX2) / 2 + rnd(-15, 15);
      const ctrlY = (stemY1 + stemY2) / 2 + rnd(-10, 20);

      const stem = document.createElementNS(SVG_NS, 'path');
      stem.setAttribute('d', `M ${stemX1} ${stemY1} Q ${ctrlX} ${ctrlY} ${stemX2} ${stemY2}`);
      stem.setAttribute('stroke', '#6B8F5E');
      stem.setAttribute('stroke-width', String(rnd(1.2, 2.2)));
      stem.setAttribute('fill', 'none');
      stem.setAttribute('opacity', '0.7');
      stemsG.appendChild(stem);

      // Occasional leaf
      if (Math.random() < 0.22) {
        addLeaf(stemsG, ctrlX, ctrlY, rnd(-40, 40));
      }
    }
  });
}

function addLeaf(parent, x, y, rot) {
  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('transform', `translate(${x},${y}) rotate(${rot})`);

  const leaf = document.createElementNS(SVG_NS, 'ellipse');
  leaf.setAttribute('cx', '0');
  leaf.setAttribute('cy', '-12');
  leaf.setAttribute('rx', '7');
  leaf.setAttribute('ry', '14');
  leaf.setAttribute('fill', '#7FAF6E');
  leaf.setAttribute('opacity', '0.75');
  g.appendChild(leaf);

  // leaf midrib
  const rib = document.createElementNS(SVG_NS, 'line');
  rib.setAttribute('x1', '0'); rib.setAttribute('y1', '0');
  rib.setAttribute('x2', '0'); rib.setAttribute('y2', '-24');
  rib.setAttribute('stroke', '#5A8A4A');
  rib.setAttribute('stroke-width', '0.8');
  rib.setAttribute('opacity', '0.6');
  g.appendChild(rib);

  parent.appendChild(g);
}

// ── WRAPPING PAPER ──────────────────────────────────────────────────────
function drawWrap() {
  const wrapG = document.getElementById('wrap-paper');

  // Gradient for wrap
  const defs = document.querySelector('#bouquet-svg defs');

  const lg = document.createElementNS(SVG_NS, 'linearGradient');
  lg.setAttribute('id', 'wrapGrad');
  lg.setAttribute('x1', '0%'); lg.setAttribute('y1', '0%');
  lg.setAttribute('x2', '100%'); lg.setAttribute('y2', '100%');
  [
    ['0%', '#FFE4EC', '0.95'],
    ['50%', '#FADADD', '0.95'],
    ['100%', '#FFB7C5', '0.9'],
  ].forEach(([off, col, op]) => {
    const s = document.createElementNS(SVG_NS, 'stop');
    s.setAttribute('offset', off);
    s.setAttribute('stop-color', col);
    s.setAttribute('stop-opacity', op);
    lg.appendChild(s);
  });
  defs.appendChild(lg);

  const lg2 = document.createElementNS(SVG_NS, 'linearGradient');
  lg2.setAttribute('id', 'wrapGrad2');
  lg2.setAttribute('x1', '0%'); lg2.setAttribute('y1', '0%');
  lg2.setAttribute('x2', '0%'); lg2.setAttribute('y2', '100%');
  [
    ['0%', '#FFF0F5', '0.7'],
    ['100%', '#FFD1DC', '0.9'],
  ].forEach(([off, col, op]) => {
    const s = document.createElementNS(SVG_NS, 'stop');
    s.setAttribute('offset', off);
    s.setAttribute('stop-color', col);
    s.setAttribute('stop-opacity', op);
    lg2.appendChild(s);
  });
  defs.appendChild(lg2);

  // Main wrap cone
  const wrap = document.createElementNS(SVG_NS, 'path');
  wrap.setAttribute('d', `
    M 130 430
    C 155 420, 190 415, 210 440
    L 245 570
    L 270 580
    L 295 570
    L 330 440
    C 350 415, 385 420, 410 430
    C 390 445, 370 450, 355 460
    L 295 580
    L 270 595
    L 245 580
    L 185 460
    C 170 450, 150 445, 130 430 Z
  `);
  wrap.setAttribute('fill', 'url(#wrapGrad)');
  wrapG.appendChild(wrap);

  // Wrap fold highlight
  const fold = document.createElementNS(SVG_NS, 'path');
  fold.setAttribute('d', `
    M 210 440 C 240 432 260 430 270 430 C 280 430 300 432 330 440
    L 295 570 L 270 582 L 245 570 Z
  `);
  fold.setAttribute('fill', 'url(#wrapGrad2)');
  fold.setAttribute('opacity', '0.5');
  wrapG.appendChild(fold);

  // Bow / ribbon
  const ribbon = document.createElementNS(SVG_NS, 'path');
  ribbon.setAttribute('d', `
    M 255 455 C 235 442, 210 448, 218 462 C 226 476, 252 470, 268 462
    C 284 470, 310 476, 318 462 C 326 448, 301 442, 281 455
    L 270 450 Z
  `);
  ribbon.setAttribute('fill', '#F0809A');
  ribbon.setAttribute('opacity', '0.8');
  wrapG.appendChild(ribbon);

  // Ribbon knot center
  const knot = document.createElementNS(SVG_NS, 'ellipse');
  knot.setAttribute('cx', '270'); knot.setAttribute('cy', '457');
  knot.setAttribute('rx', '10'); knot.setAttribute('ry', '8');
  knot.setAttribute('fill', '#E05075');
  knot.setAttribute('opacity', '0.9');
  wrapG.appendChild(knot);

  // Small dots pattern on wrap (decorative)
  for (let d = 0; d < 18; d++) {
    const dot = document.createElementNS(SVG_NS, 'circle');
    const dx = 160 + (d % 6) * 38;
    const dy = 468 + Math.floor(d / 6) * 28;
    dot.setAttribute('cx', String(dx));
    dot.setAttribute('cy', String(dy));
    dot.setAttribute('r', '2.5');
    dot.setAttribute('fill', '#F090A8');
    dot.setAttribute('opacity', '0.35');
    wrapG.appendChild(dot);
  }
}

// ── ASSEMBLE BOUQUET ─────────────────────────────────────────────────────
function buildBouquet() {
  drawWrap();

  const positions = generatePositions(FLOWER_COUNT);
  drawStems(positions);

  const flowersG = document.getElementById('flowers');

  // Sort positions so outer (larger index) are drawn first (behind center)
  // Actually draw from outside-in so center flowers are on top
  const sorted = [...positions].sort((a, b) => b.r - a.r);

  sorted.forEach((pos, idx) => {
    const t = pos.t; // 0=center, 1=edge
    // Size: center flowers are larger
    const size = 36 - t * 14 + rnd(-2, 2);

    // Color: center flowers use warmer/deeper pinks, edge use lighter/cream
    let palettePool;
    if (t < 0.25) {
      palettePool = PALETTES.filter((_, i) => i <= 4);
    } else if (t < 0.6) {
      palettePool = PALETTES;
    } else {
      palettePool = PALETTES.filter((_, i) => i >= 4);
    }
    const palette = palettePool[rndInt(0, palettePool.length - 1)];

    // Random slight jitter
    const jx = pos.x + rnd(-3, 3);
    const jy = pos.y + rnd(-3, 3);

    const flower = createFlower(jx, jy, size, palette, idx);

    // Initial state: invisible (will bloom)
    flower.style.transform = `translate(${jx}px, ${jy}px) scale(0)`;
    flower.style.transformOrigin = `${jx}px ${jy}px`;
    flower.style.transition = `transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1)`;
    flower.dataset.cx = jx;
    flower.dataset.cy = jy;
    flower.dataset.origTransform = `translate(0,0) scale(1)`;

    // Random small rotation
    const baseRot = rnd(-15, 15);
    flower.setAttribute('transform', `rotate(${baseRot}, ${jx}, ${jy}) scale(1)`);
    flower.style.transform = `rotate(${baseRot}deg) scale(0)`;

    // Use CSS animation for bloom
    const delay = idx * 18; // staggered, ms
    flower.style.animation = `none`;
    flower.style.transformBox = 'fill-box';
    flower.style.transformOrigin = 'center center';
    flower.style.transform = 'scale(0) rotate(' + baseRot + 'deg)';

    flowersG.appendChild(flower);

    // Bloom animation via timeout
    setTimeout(() => {
      flower.style.transition = `transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)`;
      flower.style.transform = `scale(1) rotate(${baseRot}deg)`;

      // After all bloomed, add sway
      if (idx === sorted.length - 1) {
        setTimeout(addSwayAnimations, 800);
      }
    }, 300 + delay);
  });
}

// ── SWAY ANIMATION ───────────────────────────────────────────────────────
function addSwayAnimations() {
  const flowers = document.querySelectorAll('#flowers g');
  const style = document.createElement('style');
  let css = '';

  flowers.forEach((flower, i) => {
    const swayAmt = rnd(0.8, 2.2);
    const dur = rnd(3.5, 6.5);
    const delay2 = rnd(0, 3);
    const rot = parseFloat(flower.style.transform.match(/rotate\(([-\d.]+)deg\)/)?.[1] || '0');
    const keyframeName = `sway${i}`;
    css += `
      @keyframes ${keyframeName} {
        0%   { transform: scale(1) rotate(${rot}deg); }
        25%  { transform: scale(1) rotate(${rot + swayAmt}deg); }
        75%  { transform: scale(1) rotate(${rot - swayAmt}deg); }
        100% { transform: scale(1) rotate(${rot}deg); }
      }
    `;
    flower.style.animation = `${keyframeName} ${dur}s ease-in-out ${delay2}s infinite`;
    flower.style.transition = '';
  });

  style.textContent = css;
  document.head.appendChild(style);
}

// ── FLOATING HEARTS ──────────────────────────────────────────────────────
function createFloatingHearts() {
  const container = document.getElementById('hearts');
  const heartChars = ['♥', '❤', '♡', '✿', '❀'];

  for (let i = 0; i < 22; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = heartChars[rndInt(0, heartChars.length - 1)];
    heart.style.left = rnd(2, 98) + '%';
    heart.style.fontSize = rnd(10, 22) + 'px';
    heart.style.animationDuration = rnd(7, 18) + 's';
    heart.style.animationDelay = rnd(0, 12) + 's';
    heart.style.color = ['#FFB7C5','#FFC0CB','#FADADD','#FFD1DC','#F090A8'][rndInt(0,4)];
    container.appendChild(heart);
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────
createFloatingHearts();
buildBouquet();
</script>
</body>
</html>
